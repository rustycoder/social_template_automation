<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IDS Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#fff;}
  .brand-logo{position:absolute;top:36px;left:40px;width:60px;height:60px;border-radius:50%;overflow:hidden;z-index:3;background:#D6293E;display:flex;align-items:center;justify-content:center;}
  .brand-logo img{width:100%;height:100%;object-fit:cover;}
  .brand-logo-fallback{font-family:'Inter',sans-serif;font-weight:800;font-size:22px;color:#fff;text-align:center;line-height:60px;}
  .photo-area{position:absolute;top:0;left:0;right:0;height:52%;overflow:hidden;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .inset-circle{position:absolute;top:44%;right:60px;width:140px;height:140px;border-radius:50%;overflow:hidden;border:5px solid #fff;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:3;background:#eee;}
  .inset-circle img{width:100%;height:100%;object-fit:cover;}
  .content{position:absolute;top:54%;left:0;right:0;bottom:0;padding:48px 60px 40px;display:flex;flex-direction:column;align-items:center;text-align:center;}
  .t-headline{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:42px;line-height:1.2;color:#1a1a1a;margin-bottom:20px;max-width:900px;}
  .t-headline mark{background:#FFD600;color:#1a1a1a;padding:4px 10px;border-radius:3px;box-decoration-break:clone;-webkit-box-decoration-break:clone;}
  .t-headline .highlight-red{background:#D6293E;color:#fff;padding:4px 10px;border-radius:3px;box-decoration-break:clone;-webkit-box-decoration-break:clone;}
  .t-description{font-family:'Inter',sans-serif;font-size:22px;line-height:1.55;color:#555;max-width:820px;margin-bottom:auto;}
  .footer-tag{position:absolute;bottom:36px;left:0;right:0;text-align:center;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;color:#D6293E;letter-spacing:.14em;text-transform:uppercase;}
</style>
</head>
<body>
  <div class="card">
    <div class="brand-logo"><img src="{{LOGO}}" alt=""><span class="brand-logo-fallback"></span></div>
    <div class="photo-area">
      <img class="t-photo" src="{{PHOTO}}" alt="">
    </div>
    <div class="inset-circle"><img src="{{INSET}}" alt=""></div>
    <div class="content">
      <div class="t-headline">{{HEADLINE}}</div>
      <div class="t-description">{{DESCRIPTION}}</div>
    </div>
    <div class="footer-tag">{{FOOTER_TAG}}</div>
  </div>
</body>
</html>
