<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Privacy-First Data Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Barlow+Condensed:wght@700&family=JetBrains+Mono:wght@500;600&family=Playfair+Display:wght@500;600&family=Oswald:wght@600&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
.logo-slot{position:absolute;bottom:44px;right:44px;left:auto;top:auto;width:68px;height:68px;border:2px dashed rgba(255,255,255,0.35);border-radius:12px;background:rgba(255,255,255,0.08);overflow:hidden;z-index:8;}.logo-slot img{width:100%;height:100%;object-fit:contain;padding:6px;}.card{position:relative;width:1080px;height:1080px;background:#020617;}.t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}.scrim{position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(34,197,94,0.08) 0 2px,transparent 2px 24px),linear-gradient(to top,rgba(2,6,23,0.92),transparent);}.copy{position:absolute;left:72px;right:72px;bottom:110px;text-align:left;z-index:4;}.t-title{font-family:'JetBrains Mono',monospace;font-size:46px;font-weight:800;color:#4ade80;line-height:1.15;}.t-subtitle{margin-top:16px;font-size:21px;color:#86efac;line-height:1.45;}.t-title,.t-subtitle,.t-quote mark{background:#22c55e;color:#052e16;padding:2px 6px;border-radius:2px;}.t-title,.t-subtitle,.t-quote .highlight-red{background:#D6293E;color:#fff;padding:2px 6px;border-radius:2px;}
</style>
</head>
<body>
  <div class="card">
<img class="t-photo" src="{{PHOTO}}" alt=""><div class="scrim"></div><div class="logo-slot"><img src="{{LOGO}}" alt=""></div><div class="copy"><div class="t-title">{{TITLE}}</div><div class="t-subtitle">{{SUBTITLE}}</div></div>
  </div>
</body>
</html>
