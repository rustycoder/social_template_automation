<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Celebrity Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#2e1065;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .scrim{position:absolute;inset:0;background:linear-gradient(105deg,rgba(46,16,101,0.92) 0%,rgba(46,16,101,0.55) 45%,rgba(88,28,135,0.75) 100%);}
  .logo-slot{position:absolute;top:48px;right:52px;width:76px;height:76px;border:2px dashed rgba(212,175,55,0.45);border-radius:50%;background:rgba(0,0,0,0.25);overflow:hidden;z-index:2;}
  .logo-slot img{width:100%;height:100%;object-fit:contain;padding:8px;}
  .profile{position:absolute;left:56px;right:56px;bottom:56px;top:120px;z-index:2;display:flex;flex-direction:column;}
  .t-name{font-family:'Cinzel',serif;font-size:58px;font-weight:700;color:#fff;line-height:1.1;margin-bottom:8px;}
  .t-name mark{background:linear-gradient(90deg,#d4af37,#f5d77a);color:#2e1065;padding:2px 10px;border-radius:3px;}
  .t-profession{font-size:20px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#d4af37;margin-bottom:28px;}
  .t-bio{font-size:20px;line-height:1.55;color:rgba(255,255,255,0.9);margin-bottom:20px;max-width:820px;}
  .t-facts{font-size:17px;line-height:1.5;color:rgba(255,255,255,0.75);margin-bottom:28px;white-space:pre-line;}
  .t-quote{border-left:4px solid #d4af37;padding:16px 0 16px 24px;font-size:22px;font-style:italic;color:#f3e8ff;line-height:1.45;max-width:780px;}
</style>
</head>
<body>
  <div class="card">
    <img class="t-photo" src="{{PHOTO}}" alt="">
    <div class="scrim"></div>
    <div class="logo-slot"><img class="t-logo" src="{{LOGO}}" alt=""></div>
    <div class="profile">
      <div class="t-name">{{NAME}}</div>
      <div class="t-profession">{{PROFESSION}}</div>
      <div class="t-bio">{{BIO}}</div>
      <div class="t-facts">{{FACTS}}</div>
      <div class="t-quote">"{{QUOTE}}"</div>
    </div>
  </div>
</body>
</html>
