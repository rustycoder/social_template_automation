<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exoplanet Atmospheric Spectroscopy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Barlow+Condensed:wght@700&family=JetBrains+Mono:wght@500;600&family=Playfair+Display:wght@500;600&family=Oswald:wght@600&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
.logo-slot{position:absolute;top:40px;left:44px;right:auto;bottom:auto;width:68px;height:68px;border:2px dashed rgba(255,255,255,0.35);border-radius:12px;background:rgba(255,255,255,0.08);overflow:hidden;z-index:8;}.logo-slot img{width:100%;height:100%;object-fit:contain;padding:6px;}.card{position:relative;width:1080px;height:1080px;background:#000;}.t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;contrast(1.1)}.scrim{position:absolute;inset:0;background:radial-gradient(circle at 60% 40%,rgba(59,130,246,0.35),rgba(0,0,0,0.92));}.copy{position:absolute;left:72px;right:72px;bottom:110px;text-align:left;z-index:4;}.t-title{font-family:'Inter',sans-serif;font-size:46px;font-weight:800;color:#e0f2fe;line-height:1.15;}.t-subtitle{margin-top:16px;font-size:21px;color:#bae6fd;line-height:1.45;}.t-title,.t-subtitle,.t-quote mark{background:#38bdf8;color:#0c4a6e;padding:2px 6px;border-radius:2px;}.t-title,.t-subtitle,.t-quote .highlight-red{background:#D6293E;color:#fff;padding:2px 6px;border-radius:2px;}
</style>
</head>
<body>
  <div class="card">
<img class="t-photo" src="{{PHOTO}}" alt=""><div class="scrim"></div><div class="logo-slot"><img src="{{LOGO}}" alt=""></div><div class="copy"><div class="t-title">{{TITLE}}</div><div class="t-subtitle">{{SUBTITLE}}</div></div>
  </div>
</body>
</html>
