<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sky Sports Statement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:linear-gradient(135deg,#0B1354 0%,#1a2766 100%);}
  .text-half{position:absolute;top:0;left:0;width:50%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:64px 56px;z-index:2;}
  .quote-marks{font-size:80px;color:#D32F2F;font-family:'Playfair Display',serif;line-height:1;margin-bottom:16px;}
  .t-headline{font-family:'Playfair Display',serif;font-weight:400;font-size:34px;line-height:1.45;color:#fff;margin-bottom:32px;}
  .t-headline mark{background:transparent;color:#fff;font-weight:700;}
  .attribution{font-family:'Inter',sans-serif;font-weight:600;font-size:20px;color:rgba(255,255,255,0.7);margin-top:auto;padding-top:24px;}
  .brand-text{font-family:'Inter',sans-serif;font-weight:800;font-size:16px;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-top:20px;}
  .photo-half{position:absolute;top:0;right:0;width:52%;height:100%;overflow:hidden;clip-path:polygon(8% 0,100% 0,100% 100%,0% 100%);}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
</style>
</head>
<body>
  <div class="card">
    <div class="text-half">
      <div class="quote-marks">&#10077;</div>
      <div class="t-headline">{{QUOTE}}</div>
      <div class="attribution">— {{ATTRIBUTION}}</div>
      <div class="brand-text">sky sports</div>
    </div>
    <div class="photo-half">
      <img class="t-photo" src="{{PHOTO}}" alt="">
    </div>
  </div>
</body>
</html>
