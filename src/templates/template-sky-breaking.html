<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sky Sports Breaking News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#1B1F3B;}
  .photo-area{position:absolute;top:0;left:0;right:0;height:55%;overflow:hidden;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .photo-scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(27,31,59,0) 50%,rgba(27,31,59,0.6) 80%,rgba(27,31,59,1) 100%);}
  .tag-badge{position:absolute;top:53%;left:48px;z-index:2;background:#D32F2F;color:#fff;font-family:'Inter',sans-serif;font-weight:800;font-size:26px;letter-spacing:.12em;padding:12px 32px 10px;text-transform:uppercase;}
  .content-area{position:absolute;top:60%;left:48px;right:48px;bottom:120px;display:flex;flex-direction:column;justify-content:center;gap:20px;}
  .t-headline{font-family:'Inter',sans-serif;font-weight:900;font-size:50px;line-height:1.18;color:#fff;}
  .t-headline mark{background:#D32F2F;color:#fff;padding:2px 8px;border-radius:2px;}
  .subtitle{font-family:'Inter',sans-serif;font-weight:400;font-size:26px;line-height:1.4;color:rgba(255,255,255,0.75);}
  .brand-text{position:absolute;bottom:40px;left:0;right:0;text-align:center;font-family:'Inter',sans-serif;font-weight:800;font-size:20px;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,0.6);}
</style>
</head>
<body>
  <div class="card">
    <div class="photo-area">
      <img class="t-photo" src="{{PHOTO}}" alt="">
      <div class="photo-scrim"></div>
    </div>
    <div class="tag-badge">{{TAG}}</div>
    <div class="content-area">
      <div class="t-headline">{{HEADLINE}}</div>
      <div class="subtitle">{{SUBTITLE}}</div>
    </div>
    <div class="brand-text">sky sports</div>
  </div>
</body>
</html>
