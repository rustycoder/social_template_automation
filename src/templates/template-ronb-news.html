<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RONB News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  img[src=""],img:not([src]){display:none;}
  .card{position:relative;width:1080px;height:1080px;background:#0a0a0a;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.7) 35%,rgba(0,0,0,0.1) 65%,rgba(0,0,0,0.05) 100%);}
  .content{position:absolute;bottom:0;left:0;right:0;height:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 56px;z-index:2;}
  .t-tag{font-family:'Poppins',sans-serif;font-weight:900;font-size:30px;color:#E53935;text-transform:uppercase;letter-spacing:.1em;margin-bottom:24px;text-align:center;}
  .t-headline{font-family:'Poppins',sans-serif;font-weight:800;font-size:44px;line-height:1.18;color:#fff;text-align:center;max-width:960px;}
  .t-brand{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Poppins',sans-serif;font-weight:900;font-size:120px;color:rgba(255,255,255,0.04);letter-spacing:.08em;text-transform:uppercase;z-index:1;pointer-events:none;}
</style>
</head>
<body>
  <div class="card">
    <img class="t-photo" src="{{PHOTO}}" alt="">
    <div class="scrim"></div>
    <div class="t-brand">{{BRAND}}</div>
    <div class="content">
      <div class="t-tag">{{TAG}}</div>
      <div class="t-headline">{{HEADLINE}}</div>
    </div>
  </div>
</body>
</html>
