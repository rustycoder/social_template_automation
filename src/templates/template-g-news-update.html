<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>News Update</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#0c1f3f;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(12,31,63,0.88) 0%,rgba(12,31,63,0.55) 38%,rgba(12,31,63,0.72) 100%);}
  .logo-slot{position:absolute;top:48px;right:52px;width:80px;height:80px;border:2px dashed rgba(255,255,255,0.35);border-radius:12px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .logo-slot img{width:100%;height:100%;object-fit:contain;padding:8px;}
  .content{position:absolute;left:56px;right:160px;top:120px;}
  .t-headline{font-family:'Libre Baskerville',serif;font-weight:700;font-size:52px;line-height:1.2;color:#fff;margin-bottom:24px;}
  .t-headline mark{background:#fff;color:#0c1f3f;padding:2px 10px;border-radius:3px;}
  .t-headline .highlight-red{background:#1e4a8a;color:#fff;padding:2px 10px;border-radius:3px;}
  .t-subtitle{font-size:26px;line-height:1.5;color:rgba(255,255,255,0.92);font-weight:400;max-width:900px;}
  .accent-bar{position:absolute;left:56px;top:108px;width:64px;height:4px;background:#fff;border-radius:2px;}
</style>
</head>
<body>
  <div class="card">
    <img class="t-photo" src="{{PHOTO}}" alt="">
    <div class="scrim"></div>
    <div class="logo-slot"><img class="t-logo" src="{{LOGO}}" alt=""></div>
    <div class="accent-bar"></div>
    <div class="content">
      <div class="t-headline">{{HEADLINE}}</div>
      <div class="t-subtitle">{{SUBTITLE}}</div>
    </div>
  </div>
</body>
</html>
