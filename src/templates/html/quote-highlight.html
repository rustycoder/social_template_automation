<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quote Highlight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#000;}
  .photo-area{position:absolute;inset:0;overflow:hidden;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 30%;}
  .photo-scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.15) 0%,rgba(0,0,0,0.1) 45%,rgba(0,0,0,0.85) 78%,rgba(0,0,0,0.95) 100%);}
  .content-area{position:absolute;left:56px;right:56px;bottom:64px;z-index:2;}
  .t-quote{font-family:'Inter',sans-serif;font-weight:800;font-size:38px;line-height:1.5;color:#fff;}
  .t-quote mark{background:#FFE600;color:#111;box-decoration-break:clone;-webkit-box-decoration-break:clone;padding:2px 6px;}
</style>
</head>
<body>
  <div class="card">
    <div class="photo-area">
      <img class="t-photo" src="{{PHOTO}}" alt="">
      <div class="photo-scrim"></div>
    </div>
    <div class="content-area">
      <div class="t-quote">{{QUOTE}}</div>
    </div>
  </div>
</body>
</html>
