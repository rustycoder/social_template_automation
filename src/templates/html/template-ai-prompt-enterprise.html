<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Prompt Engineering for Enterprise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
.logo-slot{position:absolute;top:40px;right:44px;left:auto;bottom:auto;width:68px;height:68px;border:2px dashed rgba(255,255,255,0.35);border-radius:12px;background:rgba(255,255,255,0.08);overflow:hidden;z-index:8;}.logo-slot img{width:100%;height:100%;object-fit:contain;padding:6px;}.card{position:relative;width:1080px;height:1080px;background:#030712;}.stars{position:absolute;inset:0;background:radial-gradient(circle at 20% 30%,#1e3a8a 0%,transparent 40%),radial-gradient(circle at 80% 70%,#7c3aed 0%,transparent 45%),#030712;}.t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.35;}.glass{position:absolute;left:90px;right:90px;top:50%;transform:translateY(-50%);padding:56px 52px;border-radius:28px;background:rgba(15,23,42,0.55);border:1px solid rgba(56,189,248,0.35);backdrop-filter:blur(12px);z-index:4;}.t-title{font-size:44px;font-weight:800;color:#e0f2fe;line-height:1.15;}.t-subtitle{margin-top:18px;font-size:21px;color:#bae6fd;line-height:1.5;}.t-title,.t-subtitle,.t-quote mark{background:#38bdf8;color:#0c4a6e;padding:2px 6px;border-radius:2px;}.t-title,.t-subtitle,.t-quote .highlight-red{background:#D6293E;color:#fff;padding:2px 6px;border-radius:2px;}
</style>
</head>
<body>
  <div class="card">
<div class="stars"></div><img class="t-photo" src="{{PHOTO}}" alt=""><div class="logo-slot"><img src="{{LOGO}}" alt=""></div><div class="glass"><div class="t-title">{{TITLE}}</div><div class="t-subtitle">{{SUBTITLE}}</div></div>
  </div>
</body>
</html>
