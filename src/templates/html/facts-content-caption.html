<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facts Carousel - Content</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Archivo Black',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#000;}
  .photo-area{position:absolute;top:0;left:0;right:0;height:78%;overflow:hidden;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .photo-scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 55%,rgba(0,0,0,0.75) 85%,rgba(0,0,0,0.95) 100%);}
  .content-area{position:absolute;top:70%;left:56px;right:56px;bottom:60px;display:flex;align-items:center;justify-content:center;text-align:center;}
  .t-caption{font-family:'Inter',sans-serif;font-weight:700;font-size:40px;line-height:1.32;letter-spacing:-.005em;color:rgba(255,255,255,0.92);}
  .t-caption mark{background:transparent;color:#FFE600;font-family:'Archivo Black',sans-serif;font-weight:400;padding:0;}
</style>
</head>
<body>
  <div class="card">
    <div class="photo-area">
      <img class="t-photo" src="{{PHOTO}}" alt="">
      <div class="photo-scrim"></div>
    </div>
    <div class="content-area">
      <div class="t-caption">{{CAPTION}}</div>
    </div>
  </div>
</body>
</html>
