<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Channel 4 Tweet Style</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#76FF03;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .brand-text{position:absolute;top:36px;left:44px;font-weight:700;font-size:20px;color:rgba(0,0,0,0.6);letter-spacing:.06em;text-transform:uppercase;}
  .tweet-card{width:85%;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.12);padding:44px 48px 40px;display:flex;flex-direction:column;gap:24px;}
  .tweet-header{display:flex;align-items:center;gap:14px;}
  .avatar{width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#ddd;}
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .user-info{flex:1;}
  .display-name{font-weight:700;font-size:20px;color:#14171A;line-height:1.3;}
  .handle-row{display:flex;align-items:center;gap:8px;}
  .handle{font-size:16px;color:#657786;font-weight:400;}
  .time{font-size:16px;color:#657786;font-weight:400;}
  .tweet-body{font-size:23px;line-height:1.55;color:#14171A;font-weight:400;}
  .engagement{display:flex;align-items:center;gap:40px;padding-top:16px;border-top:1px solid #e1e8ed;font-size:17px;color:#657786;}
  .engagement span{display:flex;align-items:center;gap:6px;}
</style>
</head>
<body>
  <div class="card">
    <div class="brand-text">{{BRAND}}</div>
    <div class="tweet-card">
      <div class="tweet-header">
        <div class="avatar"><img src="{{AVATAR}}" alt=""></div>
        <div class="user-info">
          <div class="display-name">{{DISPLAY_NAME}}</div>
          <div class="handle-row">
            <span class="handle">{{HANDLE}}</span>
            <span class="time">· {{TIME}}</span>
          </div>
        </div>
      </div>
      <div class="tweet-body">{{TWEET_TEXT}}</div>
      <div class="engagement">
        <span>♡ 164</span>
        <span>💬 10</span>
        <span>🔁 6</span>
        <span>↗</span>
      </div>
    </div>
  </div>
</body>
</html>
