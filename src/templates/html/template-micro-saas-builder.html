<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Micro-SaaS Builder Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
.logo-slot{position:absolute;top:40px;left:44px;right:auto;bottom:auto;width:68px;height:68px;border:2px dashed rgba(255,255,255,0.35);border-radius:12px;background:rgba(255,255,255,0.08);overflow:hidden;z-index:8;}.logo-slot img{width:100%;height:100%;object-fit:contain;padding:6px;}.card{position:relative;width:1080px;height:1080px;background:#1a1a1e;}.bg-photo{position:absolute;inset:0;filter:blur(3px) brightness(0.45);}.bg-photo img{width:100%;height:100%;object-fit:cover;}.panel{position:absolute;left:72px;right:72px;top:140px;bottom:100px;background:#fff;border-radius:24px;padding:48px 44px;box-shadow:0 24px 60px rgba(0,0,0,0.35);z-index:3;}.t-title{font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;color:#111;margin-bottom:36px;}.steps{display:grid;grid-template-columns:1fr 1fr;gap:22px;}.step{background:#f8fafc;border-radius:14px;padding:20px 18px;border-left:5px solid #f97316;font-size:17px;line-height:1.45;color:#334155;}.step mark{background:#fb923c;color:#111;padding:2px 6px;border-radius:2px;}.step .highlight-red{background:#ea580c;color:#fff;padding:2px 6px;border-radius:2px;}
</style>
</head>
<body>
  <div class="card">
<div class="bg-photo"><img src="{{PHOTO}}" alt=""></div><div class="logo-slot"><img src="{{LOGO}}" alt=""></div><div class="panel"><div class="t-title">{{TITLE}}</div><div class="steps"><div class="step">{{STEP1}}</div><div class="step">{{STEP2}}</div><div class="step">{{STEP3}}</div><div class="step">{{STEP4}}</div></div></div>
  </div>
</body>
</html>
