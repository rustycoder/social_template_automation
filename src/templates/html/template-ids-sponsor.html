<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IDS with Sponsor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  img[src=""],img:not([src]){display:none;}
  .card{position:relative;width:1080px;height:1080px;background:#fff;}
  .sponsor-logo{position:absolute;top:28px;right:36px;height:50px;width:auto;object-fit:contain;z-index:4;}
  .photo-area{position:absolute;top:0;left:0;right:0;height:55%;overflow:hidden;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .red-divider{position:absolute;top:55%;left:0;right:0;height:4px;background:#E53935;z-index:3;}
  .content{position:absolute;top:56%;left:0;right:0;bottom:12%;display:flex;align-items:center;justify-content:center;padding:32px 72px;z-index:2;}
  .t-headline{font-family:'Inter',sans-serif;font-weight:600;font-size:36px;line-height:1.45;color:#1a1a1a;text-align:center;max-width:900px;}
  .t-headline mark{background:#FFD600;color:#1a1a1a;padding:2px 8px;border-radius:3px;box-decoration-break:clone;-webkit-box-decoration-break:clone;}
  .sponsor-banner{position:absolute;bottom:0;left:0;right:0;height:12%;overflow:hidden;z-index:3;background:#f5f5f5;}
  .sponsor-banner img{width:100%;height:100%;object-fit:cover;}
</style>
</head>
<body>
  <div class="card">
    <img class="sponsor-logo" src="{{SPONSOR_LOGO}}" alt="">
    <div class="photo-area">
      <img class="t-photo" src="{{PHOTO}}" alt="">
    </div>
    <div class="red-divider"></div>
    <div class="content">
      <div class="t-headline">{{HEADLINE}}</div>
    </div>
    <div class="sponsor-banner"><img src="{{SPONSOR_BANNER}}" alt=""></div>
  </div>
</body>
</html>
