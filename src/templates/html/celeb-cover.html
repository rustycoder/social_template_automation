<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Celeb List - Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1350px;overflow:hidden;font-family:'Archivo Black',sans-serif;}
  .card{position:relative;width:1080px;height:1350px;background:#000;}
  .photo-area{position:absolute;top:0;left:0;right:0;height:68%;overflow:hidden;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;}
  .divider{position:absolute;top:68%;left:0;right:0;height:6px;background:#FFE600;}
  .content-area{position:absolute;top:calc(68% + 6px);left:56px;right:56px;bottom:0;display:flex;align-items:center;justify-content:center;text-align:center;}
  .t-headline{font-family:'Archivo Black',sans-serif;font-weight:400;font-size:60px;line-height:1.16;letter-spacing:-.005em;text-transform:uppercase;color:#FFE600;}
</style>
</head>
<body>
  <div class="card">
    <div class="photo-area">
      <img class="t-photo" src="{{PHOTO}}" alt="">
    </div>
    <div class="divider"></div>
    <div class="content-area">
      <div class="t-headline">{{HEADLINE}}</div>
    </div>
  </div>
</body>
</html>
