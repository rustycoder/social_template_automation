<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Viral / Shock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#0a0a0b;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .scrim{position:absolute;inset:0;background:linear-gradient(to top, rgba(2,2,3,0.92) 0%, rgba(2,2,3,0.72) 35%, rgba(2,2,3,0.30) 60%, rgba(2,2,3,0.10) 100%);}
  .body{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 70px 80px;text-align:center;}
  .badge{display:inline-block;background:#FFD600;color:#0a0a0b;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:64px;letter-spacing:.06em;padding:10px 38px 8px;transform:skewX(-4deg);box-shadow:4px 4px 0 #D6293E;margin-bottom:38px;}
  .badge span{display:inline-block;transform:skewX(4deg);}
  .t-headline{font-family:'Inter',sans-serif;font-weight:700;font-size:46px;line-height:1.22;color:#fff;margin-bottom:22px;max-width:920px;}
  .t-headline mark{background:#FFD600;color:#0a0a0b;padding:2px 6px;border-radius:2px;}
  .t-headline .highlight-red{background:#D6293E;color:#fff;padding:2px 6px;border-radius:2px;}
  .t-desc{font-size:20px;color:#b0b1b5;line-height:1.55;max-width:820px;margin-bottom:40px;}
  .source-pill{display:inline-block;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:8px 26px;font-size:16px;color:#d0d1d4;font-weight:500;letter-spacing:.03em;}
</style>
</head>
<body>
  <div class="card">
    <img class="t-photo" src="{{PHOTO}}" alt="">
    <div class="scrim"></div>
    <div class="body">
      <div class="badge"><span>{{BADGE}}</span></div>
      <div class="t-headline">{{HEADLINE}}</div>
      <div class="t-desc">{{DESCRIPTION}}</div>
      <div class="source-pill">{{SOURCE}}</div>
    </div>
  </div>
</body>
</html>
