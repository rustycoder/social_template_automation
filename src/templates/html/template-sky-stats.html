<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sky Sports Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#1a1a2e;}
  .photo-bg{position:absolute;inset:0;width:100%;height:100%;overflow:hidden;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .photo-scrim{position:absolute;inset:0;background:rgba(0,0,0,0.35);}
  .stats-card{position:absolute;top:80px;left:80px;width:420px;bottom:120px;background:rgba(255,255,255,0.92);border-radius:12px;padding:36px 32px;display:flex;flex-direction:column;z-index:2;overflow:hidden;}
  .stats-title{font-family:'Inter',sans-serif;font-weight:700;font-size:28px;color:#1a1a2e;margin-bottom:4px;}
  .stats-subtitle{font-family:'Inter',sans-serif;font-weight:400;font-size:18px;color:rgba(26,26,46,0.6);margin-bottom:24px;}
  .stats-rows{flex:1;display:flex;flex-direction:column;gap:0;}
  .stat-row{display:flex;align-items:center;padding:14px 12px;border-bottom:1px solid rgba(0,0,0,0.08);font-family:'Inter',sans-serif;font-weight:500;font-size:18px;color:#1a1a2e;}
  .stat-row.highlight{background:#D32F2F;color:#fff;border-radius:6px;border-bottom:none;font-weight:700;}
  .stat-name{flex:1;}
  .stat-val{width:60px;text-align:center;font-weight:600;}
  .t-headline mark{background:#D32F2F;color:#fff;padding:1px 4px;border-radius:2px;}
  .brand-text{position:absolute;bottom:36px;left:0;right:0;text-align:center;font-family:'Inter',sans-serif;font-weight:800;font-size:18px;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,0.7);z-index:2;}
</style>
</head>
<body>
  <div class="card">
    <div class="photo-bg">
      <img class="t-photo" src="{{PHOTO}}" alt="">
      <div class="photo-scrim"></div>
    </div>
    <div class="stats-card">
      <div class="stats-title">{{TITLE}}</div>
      <div class="stats-subtitle">{{SUBTITLE}}</div>
      <div class="stats-rows">{{STAT_ROWS}}</div>
    </div>
    <div class="brand-text">sky sports</div>
  </div>
</body>
</html>
