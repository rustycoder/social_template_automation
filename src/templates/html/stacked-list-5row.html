<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stacked List - 5 Rows</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1350px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1350px;background:#000;display:flex;flex-direction:column;}
  .list-row{position:relative;flex:1;overflow:hidden;border-top:2px solid #000;}
  .list-row:first-child{border-top:none;}
  .list-row img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .row-scrim{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,0.35) 0%,rgba(0,0,0,0) 45%,rgba(0,0,0,0) 65%,rgba(0,0,0,0.5) 100%);}
  .row-title{position:absolute;top:50%;left:36px;transform:translateY(-50%);z-index:2;font-family:'Playfair Display',serif;font-weight:800;font-size:40px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,0.6);max-width:70%;}
  .row-tag{position:absolute;bottom:16px;right:24px;z-index:2;font-family:'Inter',sans-serif;font-weight:600;font-size:20px;font-style:italic;color:rgba(255,255,255,0.9);text-shadow:0 2px 8px rgba(0,0,0,0.6);}
</style>
</head>
<body>
  <div class="card">
    <div class="list-row">
      <img src="{{PHOTO_1}}" alt="">
      <div class="row-scrim"></div>
      <div class="row-title">{{TITLE_1}}</div>
      <div class="row-tag">{{TAG_1}}</div>
    </div>
    <div class="list-row">
      <img src="{{PHOTO_2}}" alt="">
      <div class="row-scrim"></div>
      <div class="row-title">{{TITLE_2}}</div>
      <div class="row-tag">{{TAG_2}}</div>
    </div>
    <div class="list-row">
      <img src="{{PHOTO_3}}" alt="">
      <div class="row-scrim"></div>
      <div class="row-title">{{TITLE_3}}</div>
      <div class="row-tag">{{TAG_3}}</div>
    </div>
    <div class="list-row">
      <img src="{{PHOTO_4}}" alt="">
      <div class="row-scrim"></div>
      <div class="row-title">{{TITLE_4}}</div>
      <div class="row-tag">{{TAG_4}}</div>
    </div>
    <div class="list-row">
      <img src="{{PHOTO_5}}" alt="">
      <div class="row-scrim"></div>
      <div class="row-title">{{TITLE_5}}</div>
      <div class="row-tag">{{TAG_5}}</div>
    </div>
  </div>
</body>
</html>
