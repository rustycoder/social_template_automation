<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mechanical Keyboard Craft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Barlow+Condensed:wght@700&family=JetBrains+Mono:wght@500;600&family=Playfair+Display:wght@500;600&family=Oswald:wght@600&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
.logo-slot{position:absolute;bottom:44px;left:44px;right:auto;top:auto;width:68px;height:68px;border:2px dashed rgba(255,255,255,0.35);border-radius:12px;background:rgba(255,255,255,0.08);overflow:hidden;z-index:8;}.logo-slot img{width:100%;height:100%;object-fit:contain;padding:6px;}.card{position:relative;width:1080px;height:1080px;background:#18181b;}.t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(0.5);}.glow{position:absolute;inset:0;background:linear-gradient(120deg,rgba(236,72,153,0.35),rgba(59,130,246,0.35));mix-blend-mode:screen;}.copy{position:absolute;left:64px;right:64px;top:50%;transform:translateY(-50%);z-index:4;}.t-title{font-family:'JetBrains Mono',monospace;font-size:42px;color:#f4f4f5;font-weight:700;}.t-subtitle{margin-top:18px;font-size:20px;color:#e4e4e7;line-height:1.5;}.t-title,.t-subtitle,.t-quote mark{background:#a78bfa;color:#0a0a0b;padding:2px 6px;border-radius:2px;}.t-title,.t-subtitle,.t-quote .highlight-red{background:#D6293E;color:#fff;padding:2px 6px;border-radius:2px;}
</style>
</head>
<body>
  <div class="card">
<img class="t-photo" src="{{PHOTO}}" alt=""><div class="glow"></div><div class="logo-slot"><img src="{{LOGO}}" alt=""></div><div class="copy"><div class="t-title">{{TITLE}}</div><div class="t-subtitle">{{SUBTITLE}}</div></div>
  </div>
</body>
</html>
