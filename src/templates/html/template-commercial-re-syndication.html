<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Commercial Real Estate Syndication</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Barlow+Condensed:wght@700&family=JetBrains+Mono:wght@500;600&family=Playfair+Display:wght@500;600&family=Oswald:wght@600&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
.logo-slot{position:absolute;bottom:44px;left:44px;right:auto;top:auto;width:68px;height:68px;border:2px dashed rgba(255,255,255,0.35);border-radius:12px;background:rgba(255,255,255,0.08);overflow:hidden;z-index:8;}.logo-slot img{width:100%;height:100%;object-fit:contain;padding:6px;}.card{position:relative;width:1080px;height:1080px;background:#0f172a;}.t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}.vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(15,23,42,0.85) 100%),linear-gradient(to top,rgba(15,23,42,0.9),transparent 50%);}.copy{position:absolute;left:72px;right:72px;bottom:120px;z-index:4;}.t-title{font-family:'Inter',sans-serif;font-size:48px;font-weight:700;color:#fff;line-height:1.15;}.t-subtitle{margin-top:16px;font-size:22px;color:#cbd5e1;line-height:1.45;}
</style>
</head>
<body>
  <div class="card">
<img class="t-photo" src="{{PHOTO}}" alt=""><div class="vig"></div><div class="logo-slot"><img src="{{LOGO}}" alt=""></div><div class="copy"><div class="t-title">{{TITLE}}</div><div class="t-subtitle">{{SUBTITLE}}</div></div>
  </div>
</body>
</html>
