<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Side by Side Comparison</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#efefef;}
  .split{position:absolute;top:0;left:0;right:0;height:78%;display:flex;}
  .split-cell{position:relative;flex:1;overflow:hidden;}
  .split-cell img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .logo-badge{position:absolute;top:28px;left:28px;z-index:3;height:56px;width:auto;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4));}
  .label-row{position:absolute;top:78%;left:0;right:0;bottom:0;display:flex;align-items:center;}
  .label-cell{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
  .label-cell img{height:40px;width:60px;object-fit:cover;border-radius:3px;box-shadow:0 1px 4px rgba(0,0,0,0.25);}
  .label-cell span{font-family:'Inter',sans-serif;font-weight:700;font-size:32px;color:#111;text-align:center;}
</style>
</head>
<body>
  <div class="card">
    <div class="split">
      <div class="split-cell"><img src="{{PHOTO_1}}" alt=""></div>
      <div class="split-cell"><img src="{{PHOTO_2}}" alt=""></div>
    </div>
    <img class="logo-badge" src="{{LOGO}}" alt="logo">
    <div class="label-row">
      <div class="label-cell">
        <img src="{{FLAG_1}}" alt="">
        <span>{{NAME_1}}</span>
      </div>
      <div class="label-cell">
        <img src="{{FLAG_2}}" alt="">
        <span>{{NAME_2}}</span>
      </div>
    </div>
  </div>
</body>
</html>
