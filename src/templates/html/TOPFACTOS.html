<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>
      TOPFACTOS
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@700;800&display=swap" rel="stylesheet">
    <style>
      * {
         margin:0;
         padding:0;
         box-sizing:border-box;
      }
        html,body {
         width:1080px;
         height:1080px;
         overflow:hidden;
         font-family:'Inter',sans-serif;
      }
        .card {
         position:relative;
         width:1080px;
         height:1080px;
         background:#000;
         overflow:hidden;
      }
        .t-photo {
            position:absolute;
         top:0;
         left:0;
         width:100%;
         height:78%;
            object-fit:cover;
      }
        .watermark {
            position:absolute;
            top:66%;
            left:50%;
            transform:translate(-50%,-50%);
            z-index:2;
            font-family:'Archivo Black', sans-serif;
            font-size:42px;
            color:rgba(255,255,255,0.85);
            text-shadow:0 2px 6px rgba(0,0,0,0.5);
            letter-spacing:.04em;
      }
        .fact-bar {
            position:absolute;
            bottom:0;
         left:0;
         right:0;
            min-height:22%;
            background:#000;
            z-index:3;
            display:flex;
            align-items:center;
            padding:26px 40px;
      }
        .t-fact {
            font-family:'Archivo Black', sans-serif;
            font-size:44px;
            line-height:1.15;
            color:#fff;
            text-transform:uppercase;
      }
        .t-fact mark {
            background:none;
            color:#8CE800;
      }
        .handle {
            position:absolute;
         bottom:20px;
         right:32px;
         z-index:4;
            color:#fff;
         font-weight:800;
         font-size:20px;
            display:flex;
         align-items:center;
         gap:6px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="t-photo" src="{{PHOTO}}" alt="">
      <div class="watermark">
        {{WATERMARK}}
      </div>
      <div class="fact-bar">
        <div class="t-fact">
          {{FACT_TEXT}}
        </div>
      </div>
      <div class="handle">
        {{HANDLE}}
      </div>
    </div>
  </body>
</html>
