<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Founders Vision Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#111;}
  .brand-badge{position:absolute;top:32px;left:32px;z-index:3;background:#1565C0;padding:10px 22px 8px;border-radius:5px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:#fff;letter-spacing:.04em;}
  .photos{position:absolute;top:30px;left:0;right:0;height:50%;display:flex;align-items:flex-end;justify-content:center;padding:0 40px;gap:0;}
  .photo-main{position:relative;width:55%;height:90%;border-radius:12px;overflow:hidden;z-index:2;box-shadow:0 8px 30px rgba(0,0,0,0.4);}
  .photo-main img{width:100%;height:100%;object-fit:cover;}
  .photo-secondary{position:relative;width:40%;height:80%;border-radius:12px;overflow:hidden;margin-left:-30px;z-index:1;box-shadow:0 8px 30px rgba(0,0,0,0.3);}
  .photo-secondary img{width:100%;height:100%;object-fit:cover;}
  .text-area{position:absolute;top:54%;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 60px;text-align:center;}
  .t-headline{font-family:'Poppins',sans-serif;font-weight:900;font-size:40px;line-height:1.2;color:#fff;margin-bottom:20px;max-width:920px;}
  .t-headline mark{background:none;color:#E53935;font-weight:900;font-style:normal;}
  .t-description{font-family:'Inter',sans-serif;font-weight:400;font-size:20px;line-height:1.55;color:rgba(255,255,255,0.7);max-width:820px;}
</style>
</head>
<body>
  <div class="card">
    <div class="brand-badge">{{BRAND}}</div>
    <div class="photos">
      <div class="photo-main"><img src="{{PHOTO}}" alt=""></div>
      <div class="photo-secondary"><img src="{{PHOTO2}}" alt=""></div>
    </div>
    <div class="text-area">
      <div class="t-headline">{{HEADLINE}}</div>
      <div class="t-description">{{DESCRIPTION}}</div>
    </div>
  </div>
</body>
</html>
