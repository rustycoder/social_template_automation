<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Restomod Porsche Culture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
.logo-slot{position:absolute;top:40px;right:44px;left:auto;bottom:auto;width:68px;height:68px;border:2px dashed rgba(255,255,255,0.35);border-radius:12px;background:rgba(255,255,255,0.08);overflow:hidden;z-index:8;}.logo-slot img{width:100%;height:100%;object-fit:contain;padding:6px;}.card{position:relative;width:1080px;height:1080px;background:#0a0a0b;}.stripe{position:absolute;top:0;left:0;right:0;height:8px;background:linear-gradient(90deg,#dc2626,#991b1b);z-index:9;}.split{display:flex;position:absolute;inset:0;top:8px;}.half{flex:1;overflow:hidden;}.half img{width:100%;height:100%;object-fit:cover;}.grad{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,0.75),transparent 60%);}.copy{position:absolute;left:56px;right:56px;bottom:72px;z-index:4;}.t-title{font-family:'Oswald',sans-serif;font-size:54px;color:#fff;text-transform:uppercase;}.t-subtitle{margin-top:12px;font-size:22px;color:#fecaca;}.t-title,.t-subtitle,.t-quote mark{background:#ef4444;color:#0a0a0b;padding:2px 6px;border-radius:2px;}.t-title,.t-subtitle,.t-quote .highlight-red{background:#D6293E;color:#fff;padding:2px 6px;border-radius:2px;}
</style>
</head>
<body>
  <div class="card">
<div class="stripe"></div><div class="split"><div class="half"><img src="{{PHOTO_LEFT}}" alt=""></div><div class="half"><img src="{{PHOTO_RIGHT}}" alt=""></div></div><div class="grad"></div><div class="logo-slot"><img src="{{LOGO}}" alt=""></div><div class="copy"><div class="t-title">{{TITLE}}</div><div class="t-subtitle">{{SUBTITLE}}</div></div>
  </div>
</body>
</html>
