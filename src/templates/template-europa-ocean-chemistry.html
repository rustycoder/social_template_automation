<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sub-Surface Ocean Chemistry on Europa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Barlow+Condensed:wght@700&family=JetBrains+Mono:wght@500;600&family=Playfair+Display:wght@500;600&family=Oswald:wght@600&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
.logo-slot{position:absolute;bottom:44px;left:44px;right:auto;top:auto;width:68px;height:68px;border:2px dashed rgba(255,255,255,0.35);border-radius:12px;background:rgba(255,255,255,0.08);overflow:hidden;z-index:8;}.logo-slot img{width:100%;height:100%;object-fit:contain;padding:6px;}.card{position:relative;width:1080px;height:1080px;background:#0c4a6e;}.t-title{position:absolute;top:48px;left:56px;right:140px;font-family:'Inter',sans-serif;font-size:40px;font-weight:800;color:#e0f2fe;z-index:5;line-height:1.15;}.t-title,.t-subtitle,.t-quote mark{background:#38bdf8;color:#0a0a0b;padding:2px 6px;border-radius:2px;}.t-title,.t-subtitle,.t-quote .highlight-red{background:#D6293E;color:#fff;padding:2px 6px;border-radius:2px;}.grid{position:absolute;left:40px;right:40px;top:160px;bottom:120px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:12px;}.cell{border-radius:16px;overflow:hidden;border:2px solid rgba(56,189,248,0.35);}.cell img{width:100%;height:100%;object-fit:cover;}
</style>
</head>
<body>
  <div class="card">
<div class="t-title">{{TITLE}}</div><div class="logo-slot"><img src="{{LOGO}}" alt=""></div><div class="grid"><div class="cell"><img src="{{PHOTO_1}}" alt=""></div><div class="cell"><img src="{{PHOTO_2}}" alt=""></div><div class="cell"><img src="{{PHOTO_3}}" alt=""></div><div class="cell"><img src="{{PHOTO_4}}" alt=""></div></div>
  </div>
</body>
</html>
