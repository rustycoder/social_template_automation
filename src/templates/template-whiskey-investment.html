<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whiskey Investment Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
.logo-slot{position:absolute;top:40px;left:44px;right:auto;bottom:auto;width:68px;height:68px;border:2px dashed rgba(255,255,255,0.35);border-radius:12px;background:rgba(255,255,255,0.08);overflow:hidden;z-index:8;}.logo-slot img{width:100%;height:100%;object-fit:contain;padding:6px;}.card{position:relative;width:1080px;height:1080px;background:linear-gradient(160deg,#78350f,#451a03);}.t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.55;}.copy{position:absolute;left:72px;right:72px;bottom:96px;z-index:4;}.t-title{font-family:'Playfair Display',serif;font-size:50px;color:#fff7ed;line-height:1.15;}.t-subtitle{margin-top:14px;font-size:21px;color:#fed7aa;}.t-title,.t-subtitle,.t-quote mark{background:#FFD600;color:#0a0a0b;padding:2px 6px;border-radius:2px;}.t-title,.t-subtitle,.t-quote .highlight-red{background:#D6293E;color:#fff;padding:2px 6px;border-radius:2px;}
</style>
</head>
<body>
  <div class="card">
<img class="t-photo" src="{{PHOTO}}" alt=""><div class="logo-slot"><img src="{{LOGO}}" alt=""></div><div class="copy"><div class="t-title">{{TITLE}}</div><div class="t-subtitle">{{SUBTITLE}}</div></div>
  </div>
</body>
</html>
