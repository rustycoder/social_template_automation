<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Al Jazeera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#0a0f0a;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.95) 0%,rgba(0,0,0,0.78) 30%,rgba(0,0,0,0.15) 60%,rgba(0,0,0,0.08) 100%);}
  .logo-slot{position:absolute;top:40px;left:44px;width:72px;height:72px;z-index:2;overflow:hidden;}
  .logo-slot img{width:100%;height:100%;object-fit:contain;}
  .green-accent-tl{position:absolute;top:0;right:0;width:120px;height:120px;z-index:1;overflow:hidden;}
  .green-accent-tl::before{content:'';position:absolute;top:-30px;right:-30px;width:160px;height:160px;background:#00A651;clip-path:polygon(100% 0,0 0,100% 100%);opacity:0.8;}
  .green-accent-bl{position:absolute;bottom:0;left:0;width:80px;height:80px;z-index:1;overflow:hidden;}
  .green-accent-bl::before{content:'';position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;background:#00A651;clip-path:polygon(0 100%,0 0,100% 100%);opacity:0.6;}
  .tag{position:absolute;bottom:420px;left:56px;z-index:3;display:inline-block;background:rgba(255,255,255,0.12);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.18);border-radius:4px;padding:8px 20px 6px;font-family:'Inter',sans-serif;font-size:16px;font-weight:600;color:#e0e2e6;letter-spacing:.08em;text-transform:uppercase;}
  .headline-area{position:absolute;left:56px;right:56px;bottom:80px;z-index:3;}
  .t-headline{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:62px;line-height:1.08;color:#fff;text-transform:uppercase;letter-spacing:.01em;}
  .t-headline mark{background:#2563EB;color:#fff;padding:2px 8px;border-radius:2px;font-style:normal;}
  .t-headline .highlight-red{background:#D6293E;color:#fff;padding:2px 8px;border-radius:2px;}
  .green-bar{position:absolute;bottom:0;left:0;right:0;height:6px;background:#00A651;z-index:3;}
</style>
</head>
<body>
  <div class="card">
    <img class="t-photo" src="{{PHOTO}}" alt="">
    <div class="scrim"></div>
    <div class="green-accent-tl"></div>
    <div class="green-accent-bl"></div>
    <div class="logo-slot"><img src="{{LOGO}}" alt=""></div>
    <div class="tag">{{TAG}}</div>
    <div class="headline-area">
      <div class="t-headline">{{HEADLINE}}</div>
    </div>
    <div class="green-bar"></div>
  </div>
</body>
</html>
