<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SportyTV News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  img[src=""],img:not([src]){display:none;}
  .card{position:relative;width:1080px;height:1080px;background:#0a0a0a;}
  .photo-area{position:absolute;top:0;left:0;right:0;height:55%;overflow:hidden;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .photo-scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.05) 0%,rgba(0,0,0,0.4) 70%,rgba(10,10,10,1) 100%);}
  .logos{position:absolute;top:40px;right:44px;display:flex;align-items:center;gap:16px;z-index:3;}
  .logos img{height:56px;width:auto;object-fit:contain;}
  .text-area{position:absolute;top:58%;left:0;right:0;bottom:16px;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:0 56px;}
  .t-headline-big{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:96px;line-height:1.0;color:#fff;text-transform:uppercase;letter-spacing:.03em;margin-bottom:20px;text-align:center;text-shadow:0 4px 30px rgba(0,0,0,0.5);}
  .t-headline-big mark{background:#FFD600;color:#0a0a0b;padding:2px 12px;border-radius:3px;box-decoration-break:clone;-webkit-box-decoration-break:clone;}
  .t-subtitle{font-family:'Inter',sans-serif;font-weight:600;font-size:22px;line-height:1.45;color:rgba(255,255,255,0.85);text-transform:uppercase;letter-spacing:.06em;max-width:860px;text-align:center;}
  .t-subtitle mark{background:none;color:#00BCD4;font-weight:700;}
  .t-subtitle .highlight-yellow{color:#FFD600;}
  .gradient-bar{position:absolute;bottom:0;left:0;right:0;height:8px;background:linear-gradient(90deg,#e40303,#ff8c00,#ffed00,#008026,#004dff,#750787);z-index:3;}
</style>
</head>
<body>
  <div class="card">
    <div class="photo-area">
      <img class="t-photo" src="{{PHOTO}}" alt="">
      <div class="photo-scrim"></div>
    </div>
    <div class="logos"><img src="{{LOGO}}" alt=""></div>
    <div class="text-area">
      <div class="t-headline-big">{{HEADLINE_BIG}}</div>
      <div class="t-subtitle">{{SUBTITLE}}</div>
    </div>
    <div class="gradient-bar"></div>
  </div>
</body>
</html>
