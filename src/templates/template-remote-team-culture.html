<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Remote Team Culture Strategy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
.logo-slot{position:absolute;bottom:44px;left:44px;right:auto;top:auto;width:68px;height:68px;border:2px dashed rgba(255,255,255,0.35);border-radius:12px;background:rgba(255,255,255,0.08);overflow:hidden;z-index:8;}.logo-slot img{width:100%;height:100%;object-fit:contain;padding:6px;}.card{position:relative;width:1080px;height:1080px;background:#1c1917;}.t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}.veil{position:absolute;inset:0;background:rgba(28,25,23,0.55);}.t-quote{position:absolute;left:80px;right:80px;top:50%;transform:translateY(-58%);font-family:'Playfair Display',serif;font-size:46px;line-height:1.35;color:#fafaf9;text-align:center;z-index:3;}.t-title,.t-subtitle,.t-quote mark{background:#FFD600;color:#0a0a0b;padding:2px 6px;border-radius:2px;}.t-title,.t-subtitle,.t-quote .highlight-red{background:#D6293E;color:#fff;padding:2px 6px;border-radius:2px;}.t-subtitle{position:absolute;left:64px;right:64px;bottom:110px;text-align:center;font-size:22px;color:#e7e5e4;letter-spacing:.08em;text-transform:uppercase;z-index:3;}
</style>
</head>
<body>
  <div class="card">
<img class="t-photo" src="{{PHOTO}}" alt=""><div class="veil"></div><div class="logo-slot"><img src="{{LOGO}}" alt=""></div><div class="t-quote">{{QUOTE}}</div><div class="t-subtitle">{{SUBTITLE}}</div>
  </div>
</body>
</html>
