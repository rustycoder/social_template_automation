<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tweet Embed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#e8e8e8;}
  .photo-area{position:absolute;top:0;left:0;right:0;height:55%;overflow:hidden;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .tweet-panel{position:absolute;bottom:0;left:0;right:0;height:45%;background:#fff;border-radius:18px 18px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,0.12);padding:40px 52px 48px;display:flex;flex-direction:column;}
  .tweet-header{display:flex;align-items:center;margin-bottom:24px;}
  .avatar{width:56px;height:56px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#ddd;}
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .tweet-user{margin-left:16px;flex:1;}
  .display-name{font-weight:700;font-size:22px;color:#0f1419;line-height:1.3;}
  .handle{font-size:18px;color:#536471;font-weight:400;}
  .x-logo{font-family:'Inter',sans-serif;font-weight:700;font-size:28px;color:#0f1419;flex-shrink:0;letter-spacing:-.02em;}
  .tweet-body{font-size:24px;line-height:1.5;color:#0f1419;font-weight:400;flex:1;}
  .tweet-body mark{background:#FFD600;color:#0a0a0b;padding:2px 6px;border-radius:2px;}
  .tweet-body .highlight-red{background:#D6293E;color:#fff;padding:2px 6px;border-radius:2px;}
</style>
</head>
<body>
  <div class="card">
    <div class="photo-area">
      <img class="t-photo" src="{{PHOTO}}" alt="">
    </div>
    <div class="tweet-panel">
      <div class="tweet-header">
        <div class="avatar"><img src="{{AVATAR}}" alt=""></div>
        <div class="tweet-user">
          <div class="display-name">{{DISPLAY_NAME}}</div>
          <div class="handle">{{HANDLE}}</div>
        </div>
        <div class="x-logo">𝕏.com</div>
      </div>
      <div class="tweet-body">{{TWEET_TEXT}}</div>
    </div>
  </div>
</body>
</html>
