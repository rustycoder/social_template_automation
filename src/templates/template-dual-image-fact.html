<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dual Image Fact</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  img[src=""],img:not([src]){display:none;}
  .card{position:relative;width:1080px;height:1080px;background:#0f0f0f;}
  .images-row{position:absolute;top:0;left:0;right:0;height:52%;display:flex;gap:4px;}
  .img-slot{flex:1;overflow:hidden;}
  .img-slot img{width:100%;height:100%;object-fit:cover;}
  .content{position:absolute;top:55%;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px 56px;}
  .t-headline{font-family:'Poppins',sans-serif;font-weight:900;font-size:42px;line-height:1.2;color:#fff;text-align:center;max-width:960px;}
  .t-headline mark{background:#FFD600;color:#1a1a1a;padding:2px 8px;}
  .t-description{font-family:'Inter',sans-serif;font-weight:500;font-size:23px;line-height:1.45;color:rgba(255,255,255,0.85);text-align:center;max-width:920px;margin-top:24px;}
  .t-description mark{background:none;color:#FFD600;font-weight:700;}
  .t-brand{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);font-family:'Inter',sans-serif;font-weight:600;font-size:16px;color:rgba(255,255,255,0.4);letter-spacing:.1em;text-transform:uppercase;}
</style>
</head>
<body>
  <div class="card">
    <div class="images-row">
      <div class="img-slot"><img src="{{PHOTO_LEFT}}" alt=""></div>
      <div class="img-slot"><img src="{{PHOTO_RIGHT}}" alt=""></div>
    </div>
    <div class="content">
      <div class="t-headline">{{HEADLINE}}</div>
      <div class="t-description">{{DESCRIPTION}}</div>
    </div>
    <div class="t-brand">{{BRAND}}</div>
  </div>
</body>
</html>
