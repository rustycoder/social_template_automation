<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Categories — manage template categories." />
  <meta name="theme-color" content="#fcf8ff" />
  <title>Categories — Content Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <script>
    window.global = window;
  </script>
</head>
<body class="admin-standalone">
  <div id="app" data-admin="true">
    <header id="app-header">
      <div class="header-brand">
        <div class="logo">
          <svg class="logo-mark" width="36" height="36" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <rect width="32" height="32" rx="8" fill="url(#logo-grad-categories)" />
            <path d="M8 10h16M8 16h12M8 22h14" stroke="#fff" stroke-width="2" stroke-linecap="round" />
            <defs>
              <linearGradient id="logo-grad-categories" x1="0" y1="0" x2="32" y2="32">
                <stop stop-color="#4f46e5" />
                <stop offset="1" stop-color="#6366f1" />
              </linearGradient>
            </defs>
          </svg>
          <h1>Content Studio</h1>
        </div>
      </div>

      <nav class="header-nav step-track" id="step-indicators" aria-label="Workflow steps">
        <button type="button" class="step-node" data-step="1">
          <span class="step-node__num">1</span>
          <span class="step-node__label">Template</span>
        </button>
        <span class="step-track__line" aria-hidden="true"></span>
        <button type="button" class="step-node" data-step="2">
          <span class="step-node__num">2</span>
          <span class="step-node__label">Data</span>
        </button>
        <span class="step-track__line" aria-hidden="true"></span>
        <button type="button" class="step-node" data-step="3">
          <span class="step-node__num">3</span>
          <span class="step-node__label">Export</span>
        </button>
      </nav>

      <div class="header-auth" id="header-auth">
        <button type="button" class="btn btn-ghost btn-sm" id="btn-login" aria-label="Sign in">
          <svg class="btn-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <circle cx="9" cy="5.5" r="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3.5 15.5c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="btn-text">Sign in</span>
        </button>
        <div class="user-menu hidden" id="user-menu">
          <button
            type="button"
            class="profile-trigger"
            id="profile-trigger"
            aria-haspopup="menu"
            aria-expanded="false"
            aria-controls="profile-dropdown"
          >
            <span class="profile-avatar" id="profile-avatar" aria-hidden="true"></span>
            <span class="user-name" id="user-name"></span>
            <svg class="profile-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M3.5 5.25L7 8.75L10.5 5.25" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="profile-dropdown hidden" id="profile-dropdown" role="menu">
            <div class="profile-dropdown-header">
              <span class="profile-dropdown-name" id="dropdown-user-name"></span>
              <span class="profile-dropdown-email" id="dropdown-user-email"></span>
            </div>
            <div class="profile-dropdown-sub" id="dropdown-sub-section">
              <span class="user-sub-badge inactive" id="dropdown-sub-badge">No subscription</span>
            </div>
            <button type="button" class="profile-dropdown-item" id="btn-content-studio" role="menuitem">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <rect x="2.667" y="2.667" width="10.666" height="10.666" rx="2" stroke="currentColor" stroke-width="1.25"/>
                <path d="M5.333 5.333h5.334M5.333 8h4M5.333 10.667h3.334" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
              </svg>
              Content Studio
            </button>
            <button type="button" class="profile-dropdown-item" id="btn-my-posts" role="menuitem">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M3.333 2.667h9.334A1.333 1.333 0 0 1 14 4v8a1.333 1.333 0 0 1-1.333 1.333H3.333A1.333 1.333 0 0 1 2 12V4a1.333 1.333 0 0 1 1.333-1.333Z" stroke="currentColor" stroke-width="1.25"/>
                <path d="M5.333 6h5.334M5.333 8.667h3.334" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
              </svg>
              My Posts
            </button>
            <button type="button" class="profile-dropdown-item hidden" id="btn-admin" role="menuitem">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M8 2v2.5M8 11.5V14M2 8h2.5M11.5 8H14M4.05 4.05l1.77 1.77M10.18 10.18l1.77 1.77M4.05 11.95l1.77-1.77M10.18 5.82l1.77-1.77" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
                <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.25"/>
              </svg>
              Template
            </button>
            <button type="button" class="profile-dropdown-item hidden" id="btn-admin-categories" role="menuitem">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M2.667 4h4.2L8 5.333h5.333A1.333 1.333 0 0 1 14.667 6.667v5.666A1.333 1.333 0 0 1 13.333 13.667H2.667A1.333 1.333 0 0 1 1.333 12.333V5.333A1.333 1.333 0 0 1 2.667 4Z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/>
              </svg>
              Categories
            </button>
            <button type="button" class="profile-dropdown-item" id="btn-my-billing" role="menuitem">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M2.667 4.667h10.666M4.667 2.667h6.666a1.333 1.333 0 0 1 1.334 1.333v9.334a1.333 1.333 0 0 1-1.334 1.333H4.667a1.333 1.333 0 0 1-1.334-1.333V4a1.333 1.333 0 0 1 1.334-1.333Z" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M6 6.667h4M6 9.333h2.667" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
              </svg>
              My Billing
            </button>
            <button type="button" class="profile-dropdown-item profile-dropdown-item-danger" id="btn-logout" role="menuitem">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M6 14H3.667A1.667 1.667 0 0 1 2 12.333V3.667A1.667 1.667 0 0 1 3.667 2H6M10.667 11.333L14 8M14 8L10.667 4.667M14 8H6" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Sign out
            </button>
          </div>
        </div>
      </div>
    </header>

    <main id="main-content" data-layout-mode="admin" class="admin-standalone__main">
      <section class="step-panel active" id="admin-page">
        <div class="admin-page">
          <header class="admin-page__header">
            <div class="admin-page__intro">
              <h2 class="page-title">Categories</h2>
              <p class="page-desc">Create and manage template categories.</p>
            </div>
          </header>

          <p class="admin-error form-error hidden" id="admin-error"></p>
          <div class="admin-loading hidden" id="admin-loading">Loading…</div>

          <div id="admin-categories-panel">
            <div class="admin-toolbar">
              <div class="posts-toolbar-field posts-toolbar-field--search">
                <label class="posts-toolbar-label" for="admin-category-search">Search</label>
                <input type="search" id="admin-category-search" class="text-input admin-search" placeholder="Search categories by name or slug…" autocomplete="off" />
              </div>
              <button type="button" class="btn btn-primary" id="btn-admin-new-category">
                <svg class="btn-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 3.333v9.334M3.333 8h9.334" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <span class="btn-text">Add category</span>
              </button>
            </div>
            <div class="admin-table-wrapper">
              <table class="admin-table admin-categories-table">
                <thead>
                  <tr>
                    <th>Category</th>
                    <th>Status</th>
                    <th class="admin-col-actions">Actions</th>
                  </tr>
                </thead>
                <tbody id="admin-categories-body"></tbody>
              </table>
            </div>
            <div class="admin-pagination" id="admin-categories-pagination" hidden>
              <label class="admin-pagination__size">
                <span class="admin-pagination__size-label">Per page</span>
                <select
                  class="text-input admin-pagination__size-select"
                  data-admin-page-size="categories"
                  aria-label="Categories per page"
                >
                  <option value="12" selected>12</option>
                  <option value="24">24</option>
                  <option value="48">48</option>
                  <option value="96">96</option>
                </select>
              </label>
              <div class="admin-pagination__nav">
                <button type="button" class="btn btn-outline btn-sm" data-admin-page-prev="categories">
                  <svg class="btn-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M10 12 6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  <span class="btn-text">Previous</span>
                </button>
                <span class="admin-pagination__label" data-admin-page-label="categories"></span>
                <button type="button" class="btn btn-outline btn-sm" data-admin-page-next="categories">
                  <span class="btn-text">Next</span>
                  <svg class="btn-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer id="app-footer" class="admin-standalone__footer">
      <div class="footer-panel footer-panel--nav active" id="footer-admin" data-footer-step="admin">
        <div class="footer-slot footer-slot--left">
          <button type="button" class="btn btn-outline" id="btn-admin-back" aria-label="Back to app">
            <svg class="btn-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M13 8H3M7 4L3 8L7 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="btn-text">Back</span>
          </button>
        </div>
      </div>
    </footer>

    <div class="toast-container" id="toast-container"></div>

    <div class="modal-overlay hidden" id="auth-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
      <div class="modal-card auth-modal" id="auth-modal">
        <button type="button" class="modal-close" id="auth-modal-close" aria-label="Close">✕</button>
        <h2 id="auth-modal-title">Sign in</h2>
        <p class="modal-desc">Sign in with an admin account to manage categories.</p>
        <form id="auth-form" class="auth-form" autocomplete="off" data-lpignore="true" data-1p-ignore="true">
          <div class="form-group hidden" id="auth-name-group">
            <label for="auth-name">Name</label>
            <input type="text" id="auth-name" class="text-input" autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="auth-email">Email</label>
            <input type="email" id="auth-email" class="text-input" required autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="auth-password">Password</label>
            <input type="password" id="auth-password" class="text-input" required minlength="8" autocomplete="off" />
          </div>
          <p class="form-error hidden" id="auth-error"></p>
          <button type="button" class="btn btn-primary btn-block" id="auth-submit-btn">
            <svg class="btn-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <circle cx="8" cy="5.333" r="2.667" stroke="currentColor" stroke-width="1.35"/>
              <path d="M2.667 13.333c0-2.4 2.4-4 5.333-4s5.333 1.6 5.333 4" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
            </svg>
            <span class="btn-text">Sign in</span>
          </button>
        </form>
        <p class="modal-footer-text">
          <button type="button" class="link-btn" id="auth-toggle-mode">Create an account</button>
        </p>
      </div>
    </div>


    <div class="modal-overlay hidden" id="admin-category-form-overlay" role="dialog" aria-modal="true" aria-labelledby="admin-category-form-title">
      <div class="modal-card admin-form-modal">
        <button type="button" class="modal-close" id="admin-category-form-close" aria-label="Close">✕</button>
        <h2 id="admin-category-form-title">Add category</h2>
        <form id="admin-category-form" class="admin-form">
          <div class="form-group">
            <label for="admin-category-label">Label</label>
            <input type="text" id="admin-category-label" class="text-input" required autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="admin-category-id">Slug</label>
            <input type="text" id="admin-category-id" class="text-input" placeholder="my-niche" autocomplete="off" />
            <p class="form-hint" id="admin-category-id-hint">Optional. Auto-generated from the label if left blank.</p>
          </div>
          <p class="form-error hidden" id="admin-category-form-error"></p>
          <div class="admin-form-actions">
            <button type="button" class="btn btn-outline" id="admin-category-form-cancel">
              <svg class="btn-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <span class="btn-text">Cancel</span>
            </button>
            <button type="submit" class="btn btn-primary" id="admin-category-form-submit">
              <svg class="btn-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M13.333 4.667 6 12 2.667 8.667" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span class="btn-text">Save category</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="/src/categoriesMain.js"></script>
</body>
</html>
