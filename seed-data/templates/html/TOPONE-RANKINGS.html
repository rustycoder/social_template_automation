<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>
      Ranking Card - Single Photo
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
      * {
         margin:0;
         padding:0;
         box-sizing:border-box;
      }
        html,body {
         width:1080px;
         height:1080px;
         overflow:hidden;
         font-family:'Inter',sans-serif;
      }
        .card {
         position:relative;
         width:1080px;
         height:1080px;
         background:#000;
         overflow:hidden;
      }
        .t-photo {
            position:absolute;
         inset:0;
         width:100%;
         height:100%;
         object-fit:cover;
      }
        .scrim {
            position:absolute;
         inset:0;
         z-index:1;
            background:linear-gradient(to bottom,      rgba(0,0,0,0.15) 0%,      rgba(0,0,0,0.05) 30%,      rgba(0,0,0,0.35) 45%,      rgba(0,0,0,0.55) 60%,      rgba(0,0,0,0.35) 75%,      rgba(0,0,0,0.15) 100%);
      }
        .content-center {
            position:absolute;
            top:40%;
            left:0;
         right:0;
            z-index:3;
            display:flex;
            flex-direction:column;
            align-items:center;
            text-align:center;
            padding:0 60px;
      }
        .t-number {
            font-size:56px;
            font-weight:900;
            color:#fff;
            text-shadow:0 2px 10px rgba(0,0,0,0.6);
            margin-bottom:6px;
            line-height:1;
      }
        .t-title {
            font-size:64px;
            font-weight:900;
            color:#fff;
            text-shadow:0 2px 10px rgba(0,0,0,0.6);
            line-height:1.05;
            margin-bottom:16px;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;
            flex-wrap:wrap;
      }
        .t-title .s-photo {
            height:1em;
            width:auto;
            object-fit:contain;
            vertical-align:middle;
            flex-shrink:0;
      }
        .t-subtitle {
            font-size:34px;
            font-weight:600;
            color:#fff;
            text-shadow:0 2px 8px rgba(0,0,0,0.6);
            line-height:1.3;
            max-width:820px;
      }
        .handle {
            position:absolute;
         bottom:36px;
         right:36px;
         z-index:4;
            color:#fff;
         font-weight:800;
         font-size:22px;
            text-shadow:0 1px 4px rgba(0,0,0,0.8);
            display:flex;
         align-items:center;
         gap:6px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="t-photo" src="{{PHOTO}}" alt="">
      <div class="scrim">
      </div>
      <div class="content-center">
        <div class="t-number">
          {{NUMBER}}
        </div>
        <div class="t-title">
          {{TITLE}} <img class="s-photo" src="{{FLAG}}" alt="">
        </div>
        <div class="t-subtitle">
          {{SUBTITLE}}
        </div>
      </div>
      <div class="handle">
        {{HANDLE}}
      </div>
    </div>
  </body>
</html>
