<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heritage Home Restorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
.logo-slot{position:absolute;top:40px;right:44px;left:auto;bottom:auto;width:68px;height:68px;border:2px dashed rgba(255,255,255,0.35);border-radius:12px;background:rgba(255,255,255,0.08);overflow:hidden;z-index:8;}.logo-slot img{width:100%;height:100%;object-fit:contain;padding:6px;}.card{position:relative;width:1080px;height:1080px;background:#292524;}.hdr{position:absolute;top:0;left:0;right:0;padding:44px 120px 28px 56px;background:rgba(0,0,0,0.65);z-index:5;}.t-title{font-family:'Oswald',sans-serif;font-size:40px;color:#fff;letter-spacing:.06em;text-transform:uppercase;}.t-title,.t-subtitle,.t-quote mark{background:#FFD600;color:#0a0a0b;padding:2px 6px;border-radius:2px;}.t-title,.t-subtitle,.t-quote .highlight-red{background:#D6293E;color:#fff;padding:2px 6px;border-radius:2px;}.split{display:flex;position:absolute;left:0;right:0;top:120px;bottom:0;}.half{flex:1;position:relative;overflow:hidden;}.half img{width:100%;height:100%;object-fit:cover;}.lbl{position:absolute;bottom:28px;left:24px;right:24px;padding:12px 16px;background:rgba(0,0,0,0.72);color:#fff;font-weight:700;font-size:20px;text-align:center;border-radius:10px;}
</style>
</head>
<body>
  <div class="card">
<div class="hdr"><div class="t-title">{{TITLE}}</div></div><div class="logo-slot"><img src="{{LOGO}}" alt=""></div><div class="split"><div class="half"><img src="{{PHOTO_LEFT}}" alt=""><div class="lbl">{{LEFT_LABEL}}</div></div><div class="half"><img src="{{PHOTO_RIGHT}}" alt=""><div class="lbl">{{RIGHT_LABEL}}</div></div></div>
  </div>
</body>
</html>
