<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stamp / Breaking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#0a0a0b;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .scrim{position:absolute;inset:0;background:linear-gradient(to top, rgba(2,2,3,0.92) 0%, rgba(2,2,3,0.65) 40%, rgba(2,2,3,0.25) 70%, rgba(2,2,3,0.10) 100%);}

  .breaking-badge{position:absolute;top:44px;left:52px;background:#D6293E;color:#fff;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;letter-spacing:.08em;padding:7px 18px 6px;}
  .date-pill{position:absolute;top:46px;right:52px;background:rgba(10,10,12,0.65);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:7px 22px;font-family:'JetBrains Mono',monospace;font-size:16px;color:#d0d1d4;letter-spacing:.03em;}

  .stamp{position:absolute;top:32%;left:5%;width:120px;height:120px;border:4px solid #D6293E;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:rotate(-18deg);opacity:0.85;}
  .stamp-inner{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:#D6293E;text-align:center;letter-spacing:.08em;text-transform:uppercase;line-height:1.15;}

  .news-tag{position:absolute;top:56%;left:52px;background:#D6293E;color:#fff;font-family:'Inter',sans-serif;font-weight:600;font-size:14px;letter-spacing:.1em;padding:4px 14px 3px;text-transform:uppercase;}

  .headline-area{position:absolute;left:52px;right:52px;top:60%;display:flex;flex-wrap:wrap;align-items:baseline;gap:0 16px;}
  .headline-big{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:80px;color:#fff;line-height:1.0;letter-spacing:-.01em;text-transform:uppercase;}
  .headline-accent{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:60px;color:#FFD600;line-height:1.05;text-transform:uppercase;}

  .t-desc{position:absolute;left:52px;right:52px;bottom:110px;font-size:22px;color:#d4d5d9;line-height:1.5;}
  .t-desc mark{background:#FFD600;color:#0a0a0b;padding:2px 8px;border-radius:2px;}

  .bottom-bar{position:absolute;left:0;right:0;bottom:0;height:68px;background:rgba(10,10,12,0.75);display:flex;align-items:center;justify-content:center;font-size:17px;color:#a0a1a5;font-weight:500;letter-spacing:.04em;}
</style>
</head>
<body>
  <div class="card">
    <img class="t-photo" src="{{PHOTO}}" alt="">
    <div class="scrim"></div>
    <div class="breaking-badge">BREAKING NEWS</div>
    <div class="date-pill">{{DATELINE}}</div>
    <div class="stamp"><div class="stamp-inner">{{STAMP_TEXT}}</div></div>
    <div class="news-tag">NEWS</div>
    <div class="headline-area">
      <div class="headline-big">{{HEADLINE_BIG}}</div>
      <div class="headline-accent">{{HEADLINE_ACCENT}}</div>
    </div>
    <div class="t-desc">{{DESCRIPTION}}</div>
    <div class="bottom-bar">{{SOURCE}}</div>
  </div>
</body>
</html>
