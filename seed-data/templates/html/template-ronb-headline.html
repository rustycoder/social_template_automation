<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RONB Headline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  img[src=""],img:not([src]){display:none;}
  .card{position:relative;width:1080px;height:1080px;background:#1a1a1a;}
  .photo-area{position:absolute;top:0;left:0;right:0;height:60%;overflow:hidden;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .photo-scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.1) 0%,rgba(0,0,0,0.3) 100%);}
  .inset-wrap{position:absolute;top:30px;left:30px;width:140px;height:140px;z-index:2;}
  .t-inset{width:140px;height:140px;border-radius:50%;object-fit:cover;border:4px solid #fff;box-shadow:0 4px 16px rgba(0,0,0,0.35);}
  .bottom-panel{position:absolute;bottom:0;left:0;right:0;height:40%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 60px;}
  .t-headline{font-family:'Poppins',sans-serif;font-weight:800;font-size:44px;line-height:1.2;color:#1a1a1a;text-align:center;max-width:960px;}
  .t-headline mark{background:none;color:#E53935;font-weight:800;}
  .t-brand{font-family:'Inter',sans-serif;font-weight:600;font-size:18px;color:#666;letter-spacing:.12em;text-transform:uppercase;position:absolute;bottom:28px;left:50%;transform:translateX(-50%);}
</style>
</head>
<body>
  <div class="card">
    <div class="photo-area">
      <img class="t-photo" src="{{PHOTO}}" alt="">
      <div class="photo-scrim"></div>
      <div class="inset-wrap">
        <img class="t-inset" src="{{INSET}}" alt="">
      </div>
    </div>
    <div class="bottom-panel">
      <div class="t-headline">{{HEADLINE}}</div>
    </div>
    <div class="t-brand">{{BRAND}}</div>
  </div>
</body>
</html>
