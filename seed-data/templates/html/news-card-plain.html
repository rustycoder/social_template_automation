<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>News Card - Plain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Georgia&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1920px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1920px;background:#111;}
  .photo-area{position:absolute;inset:0;overflow:hidden;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 25%;}
  .news-box{position:absolute;left:64px;right:64px;bottom:110px;background:#fff;box-shadow:0 18px 40px rgba(0,0,0,0.35);}
  .masthead-bar{background:#0C3B8C;padding:26px 0;text-align:center;}
  .masthead-text{font-family:Georgia,'Times New Roman',serif;font-size:40px;color:#fff;letter-spacing:.01em;}
  .masthead-text .light{font-family:'Inter',sans-serif;font-weight:400;}
  .masthead-text .bold{font-weight:700;font-style:italic;}
  .headline-area{padding:36px 40px 40px;}
  .headline-text{font-family:'Inter',sans-serif; font-weight:800;font-size:40px;line-height:1.32;color:#111;}
</style>
</head>
<body>
  <div class="card">
    <div class="photo-area">
      <img class="t-photo" src="{{PHOTO}}" alt="">
    </div>
    <div class="news-box">
      <div class="masthead-bar">
        <span class="masthead-text">{{MASTHEAD}}</span>
      </div>
      <div class="headline-area">
        <span class="headline-text">{{HEADLINE}}</span>
      </div>
    </div>
  </div>
</body>
</html>
