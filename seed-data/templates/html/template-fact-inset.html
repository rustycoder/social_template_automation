<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fact Card with Circle Inset</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  img[src=""],img:not([src]){display:none;}
  .card{position:relative;width:1080px;height:1080px;background:#0a0a0a;}
  .photo-area{position:absolute;top:0;left:0;right:0;height:50%;overflow:hidden;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .photo-scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 20%,rgba(10,10,10,0.8) 80%,rgba(10,10,10,1) 100%);}
  .inset-circle{position:absolute;top:30px;right:40px;width:140px;height:140px;border-radius:50%;overflow:hidden;border:4px solid #FFD700;box-shadow:0 4px 24px rgba(0,0,0,0.4);z-index:4;background:#222;}
  .inset-circle img{width:100%;height:100%;object-fit:cover;}
  .brand-icon{position:absolute;top:52%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:50%;background:#E53935;display:flex;align-items:center;justify-content:center;z-index:4;}
  .t-brand{font-family:'Inter',sans-serif;font-weight:800;font-size:16px;color:#fff;line-height:1;}
  .text-area{position:absolute;top:55%;left:0;right:0;bottom:20px;z-index:3;display:flex;flex-direction:column;align-items:center;padding:0 56px;}
  .t-headline{font-family:'Poppins',sans-serif;font-weight:900;font-size:44px;line-height:1.15;color:#fff;text-transform:uppercase;text-align:center;margin-bottom:24px;max-width:920px;}
  .t-headline mark{background:#FFD600;color:#1a1a1a;padding:2px 8px;border-radius:3px;box-decoration-break:clone;-webkit-box-decoration-break:clone;}
  .t-description{font-family:'Inter',sans-serif;font-weight:700;font-size:22px;line-height:1.55;color:rgba(255,255,255,0.88);text-align:center;max-width:860px;}
  .t-description mark{background:none;color:#FFD600;font-weight:700;}
  .t-description .highlight-green{color:#4CAF50;}
  .t-description .highlight-red{color:#E53935;}
</style>
</head>
<body>
  <div class="card">
    <div class="photo-area">
      <img class="t-photo" src="{{PHOTO}}" alt="">
      <div class="photo-scrim"></div>
    </div>
    <div class="inset-circle"><img src="{{INSET}}" alt=""></div>
    <div class="brand-icon"><span class="t-brand">{{BRAND}}</span></div>
    <div class="text-area">
      <div class="t-headline">{{HEADLINE}}</div>
      <div class="t-description">{{DESCRIPTION}}</div>
    </div>
  </div>
</body>
</html>
