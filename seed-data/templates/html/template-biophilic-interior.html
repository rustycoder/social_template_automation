<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Biophilic Interior Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
.logo-slot{position:absolute;bottom:44px;right:44px;left:auto;top:auto;width:68px;height:68px;border:2px dashed rgba(255,255,255,0.35);border-radius:12px;background:rgba(255,255,255,0.08);overflow:hidden;z-index:8;}.logo-slot img{width:100%;height:100%;object-fit:contain;padding:6px;}.card{position:relative;width:1080px;height:1080px;background:#365314;}.t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}.shade{position:absolute;inset:0;background:rgba(54,83,20,0.25);}.box{position:absolute;left:80px;right:80px;top:50%;transform:translateY(-50%);background:#fefce8;border-radius:20px;padding:52px 48px;box-shadow:0 20px 50px rgba(0,0,0,0.25);z-index:3;}.t-title{font-family:'Playfair Display',serif;font-size:44px;color:#1c1917;line-height:1.2;}.t-subtitle{margin-top:16px;font-size:20px;color:#57534e;line-height:1.5;}.t-title,.t-subtitle,.t-quote mark{background:#84cc16;color:#1a2e05;padding:2px 6px;border-radius:2px;}.t-title,.t-subtitle,.t-quote .highlight-red{background:#D6293E;color:#fff;padding:2px 6px;border-radius:2px;}
</style>
</head>
<body>
  <div class="card">
<img class="t-photo" src="{{PHOTO}}" alt=""><div class="shade"></div><div class="logo-slot"><img src="{{LOGO}}" alt=""></div><div class="box"><div class="t-title">{{TITLE}}</div><div class="t-subtitle">{{SUBTITLE}}</div></div>
  </div>
</body>
</html>
