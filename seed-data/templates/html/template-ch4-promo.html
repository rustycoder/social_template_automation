<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Channel 4 Promo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;}
  .card{position:relative;width:1080px;height:1080px;background:#000;}
  .photo-area{position:absolute;top:0;left:0;right:0;height:58%;overflow:hidden;}
  .t-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .photo-scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 60%,rgba(0,0,0,0.7) 90%,rgba(0,0,0,1) 100%);}
  .brand-text{position:absolute;top:36px;left:44px;z-index:3;font-family:'Inter',sans-serif;font-weight:900;font-size:28px;color:#fff;letter-spacing:.02em;}
  .tag-badge{position:absolute;top:55%;left:48px;z-index:3;display:inline-block;background:#4CAF50;padding:10px 24px 8px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:#fff;letter-spacing:.1em;text-transform:uppercase;border-radius:3px;}
  .content-area{position:absolute;top:62%;left:48px;right:48px;bottom:60px;display:flex;align-items:center;}
  .t-headline{font-family:'Inter',sans-serif;font-weight:900;font-size:56px;line-height:1.14;color:#fff;}
  .t-headline mark{background:none;color:#4CAF50;font-weight:900;font-style:normal;}
  .t-headline .highlight-red{color:#E53935;background:none;}
</style>
</head>
<body>
  <div class="card">
    <div class="photo-area">
      <img class="t-photo" src="{{PHOTO}}" alt="">
      <div class="photo-scrim"></div>
    </div>
    <div class="brand-text">{{BRAND}}</div>
    <div class="tag-badge">{{TAG}}</div>
    <div class="content-area">
      <div class="t-headline">{{HEADLINE}}</div>
    </div>
  </div>
</body>
</html>
